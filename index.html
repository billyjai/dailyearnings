<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DailyEarnings">
  <meta name="theme-color" content="#FFF9C4">
  <title>DailyEarnings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-apple.png">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="app">
    <div id="view-calendar" class="view"></div>
    <div id="view-report"   class="view"></div>
    <div id="view-prices"   class="view"></div>

    <nav id="tab-bar">
      <button class="tab-btn" data-tab="0" onclick="switchTab(0)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>Calendar</span>
      </button>
      <button class="tab-btn" data-tab="1" onclick="switchTab(1)">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="2" y="12" width="4" height="10" rx="1"/>
          <rect x="9" y="7" width="4" height="15" rx="1"/>
          <rect x="16" y="2" width="4" height="20" rx="1"/>
        </svg>
        <span>Report</span>
      </button>
      <button class="tab-btn" data-tab="2" onclick="switchTab(2)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
          <line x1="7" y1="7" x2="7.01" y2="7"/>
        </svg>
        <span>Prices</span>
      </button>
    </nav>
  </div>

  <!-- Entry Sheet Modal -->
  <div id="modal" class="modal-overlay" hidden></div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
